# Description: Docker compose file for running Swagger UI with the allocation-instruction OpenAPI specification.
# Usage: docker-compose up
version: '3.7'

services:
  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /spec/allocation-instruction-v2.yaml
    volumes:
      - ./allocation-instruction-v2.yaml:/spec/allocation-instruction-v2.yaml
